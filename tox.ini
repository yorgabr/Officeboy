[tox]
minversion = 4.0
envlist = 
    clean,
    lint,
    type,
    security,
    py310,
    py311,
    py312,
    coverage,
    build,
    functional,
    package-pip,
    package-portable,
    package-deb,
    package-rpm,
    package-msix
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run unit tests with pytest
deps = 
    pytest>=7.0
    pytest-cov>=4.0
    pytest-mock>=3.10
    colorama>=0.4.6
commands = 
    pytest {posargs:tests/test_cli.py -v}

[testenv:clean]
description = Clean up coverage data
deps = coverage[toml]
skip_install = true
commands = 
    coverage erase
    python -c "import shutil; shutil.rmtree('htmlcov', ignore_errors=True); shutil.rmtree('dist', ignore_errors=True); shutil.rmtree('build', ignore_errors=True)"

[testenv:lint]
description = Run linting with ruff
deps = 
    ruff>=0.1.0
skip_install = true
commands = 
    ruff check src tests
    ruff format --check src tests

[testenv:type]
description = Run type checking with mypy
deps = 
    mypy>=1.0
    types-PyYAML
    types-colorama
    types-tqdm
commands = 
    mypy src/officeboy

[testenv:security]
description = Run security checks with bandit
deps = 
    bandit[toml]>=1.7
commands = 
    bandit -r src/officeboy -f json -o bandit-report.json || true
    bandit -r src/officeboy

[testenv:py310]
description = Run tests on Python 3.10
basepython = python3.10
deps = 
    {[testenv]deps}
commands = 
    pytest tests/test_cli.py --cov=officeboy --cov-append {posargs}

[testenv:py311]
description = Run tests on Python 3.11
basepython = python3.11
deps = 
    {[testenv]deps}
commands = 
    pytest tests/test_cli.py --cov=officeboy --cov-append {posargs}

[testenv:py312]
description = Run tests on Python 3.12
basepython = python3.12
deps = 
    {[testenv]deps}
commands = 
    pytest tests/test_cli.py --cov=officeboy --cov-append {posargs}

[testenv:coverage]
description = Generate coverage report
deps = 
    coverage[toml]
    pytest>=7.0
    pytest-cov>=4.0
skip_install = true
depends = py310,py311,py312
commands = 
    coverage combine
    coverage html
    coverage xml
    coverage report --fail-under=100

[testenv:build]
description = Build source and wheel distribution
deps = 
    build>=0.10
    twine>=4.0
skip_install = true
depends = coverage
commands = 
    python -m build
    twine check dist/*

[testenv:functional]
description = Run functional tests with Robot Framework
deps = 
    {[testenv]deps}
    robotframework>=6.0
    robotframework-flaui>=2.0
depends = build
commands = 
    pytest tests/test_functional.py -v {posargs}
    robot --outputdir results tests/robot

[testenv:package-pip]
description = Create pip-installable package
deps = 
    build>=0.10
skip_install = true
depends = functional
commands = 
    python -m build --wheel
    python scripts/verify_pip_package.py

[testenv:package-portable]
description = Create PortableApps package
deps = 
    pyinstaller>=6.0
skip_install = true
depends = functional
commands = 
    pyinstaller --clean officeboy-portable.spec
    python scripts/create_portable_apps.py

[testenv:package-deb]
description = Create Debian package
deps = 
    fpm>=1.0
skip_install = true
depends = functional
commands = 
    python scripts/build_deb.py

[testenv:package-rpm]
description = Create RPM package
deps = 
    fpm>=1.0
skip_install = true
depends = functional
commands = 
    python scripts/build_rpm.py

[testenv:package-msix]
description = Create MSIX package for Windows Store
deps = 
    msix-packaging>=0.1
skip_install = true
depends = functional
commands = 
    python scripts/build_msix.py

[testenv:deploy]
description = Deploy to PyPI (requires credentials)
deps = 
    twine>=4.0
skip_install = true
depends = package-pip,package-portable,package-deb,package-rpm,package-msix
commands = 
    twine upload dist/* {posargs}

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
