name: CI with UV

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  #__________ Matrix testing across Python versions __________
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    
    - name: Install UV
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: true
    
    - name: Setup Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv venv --python ${{ matrix.python-version }}
        uv sync --all-extras
    
    - name: Run linting
      run: uv run ruff check src tests
    
    - name: Run type checking
      run: uv run mypy src/officeboy || true
    
    - name: Run security checks
      run: uv run bandit -r src/officeboy
    
    - name: Run tests with coverage
      run: uv run pytest --cov=officeboy --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  #__________ Build and release __________
  build:
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install UV
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: true
    
    - name: Setup Python
      run: uv python install 3.11
    
    - name: Install and build
      run: |
        uv venv --python 3.11
        uv sync --all-extras
        uv build
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}